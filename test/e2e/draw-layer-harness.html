<!DOCTYPE html>
<!--
  draw-layer-harness.html — e2e 載入頁，測 src/draw-layer.js（繪圖層骨架，P1）。
  import 自 /src/（同 prod 服務路徑）。不需 firebase。
  expose window.__drawTest 給 spec 注入/操作/斷言。
-->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>draw-layer e2e harness</title>
<style>
  html, body { margin: 0; }
  /* designTarget：模擬被標注的畫布。固定大小方便 playwright 用視窗座標下筆。 */
  #canvas { position: relative; width: 600px; height: 400px; background: #f3f4f6; margin: 0; }
</style>
</head>
<body>
<div id="canvas">
  <!-- 底層 app 元件（在 overlay 之下）：給 P4 elementFromPoint anchor 擷取測試用 -->
  <div id="price-card" style="position:absolute; left:80px; top:60px; width:160px; height:120px; background:#ddd;"></div>
  <div data-testid="sidebar" style="position:absolute; left:320px; top:60px; width:120px; height:200px; background:#eee;"></div>
</div>

<script type="module">
  import { initDrawLayer } from '/src/draw-layer.js';
  // Mock 瀏覽器 EyeDropper API（playwright/Chromium 無此 API）→ 回傳可由測試設定的 hex。
  window.__eyedropHex = '#123456';
  window.EyeDropper = class { open() { return Promise.resolve({ sRGBHex: window.__eyedropHex }); } };
  window.__drawTest = {
    initDrawLayer,
    init: (overrides = {}) => initDrawLayer('#canvas', overrides),
    setEyedropHex: (hex) => { window.__eyedropHex = hex; },
    ready: true,
  };
</script>
</body>
</html>
